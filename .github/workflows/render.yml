name: Terraform Multi-Environment Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - develop
      - main
  pull_request: # Equivalent to a Merge Request
    branches:
      - main
  workflow_dispatch:

jobs:
  # ==========================================
  # STEP 1: Feature Branches (Dev Plan Only)
  # ==========================================
  dev-plan:
    name: Terraform Plan (Dev)
    # Triggers only on pushes to feature/ branches
    if: startsWith(github.ref, 'refs/heads/feature/') && github.event_name == 'push'
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Plan
        # Replace with your actual dev workspace/variable passing method
        run: terraform plan -input=false -var="project_id=udk-prj-l-b"

  # ==========================================
  # STEP 2: Develop Branch (Dev Plan & Apply)
  # ==========================================
  dev-deploy:
    name: Terraform Apply (Dev)
    # Triggers only when code is merged/pushed into the develop branch
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Plan
        run: terraform plan -input=false -var="project_id=udk-prj-l-b" -out=dev.tfplan
        
      - name: Terraform Apply
        run: terraform apply -auto-approve dev.tfplan

  # ==========================================
  # STEP 3a: PR to Main (Prod Plan Only)
  # ==========================================
  prod-plan:
    name: Terraform Plan (Prod)
    # Triggers when a Merge/Pull Request is opened against the main branch
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: self-hosted
    
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Plan
        run: terraform plan -input=false -var="project_id=udk-prj-c-b"

  # ==========================================
  # STEP 3b: Main Branch (Prod Apply w/ Approval)
  # ==========================================
  prod-deploy:
    name: Terraform Apply (Prod)
    # Triggers when code is actually merged into main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    
    # IMPORTANT: This creates the manual approval gate
    environment: production 
    
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        run: terraform init
        
      - name: Terraform Plan
        run: terraform plan -input=false -var="project_id=udk-prj-c-b" -out=prod.tfplan
        
      - name: Terraform Apply
        run: terraform apply -auto-approve prod.tfplan
